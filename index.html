<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Love Word Heart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030303; /* Глубокий черный цвет */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        // Большой холст для четкости
        canvas.width = 700;
        canvas.height = 700;

        // --- НАСТРОЙКИ ДЛЯ ИЗБЕЖАНИЯ СЛИПАНИЯ ---
        const wordsCount = 75; // Сильно уменьшили количество, чтобы был зазор
        const scaleHeart = 17; // Сделали контур шире, чтобы слова не теснились
        const points = [];

        // Математическая генерация точек
        for (let i = 0; i < wordsCount; i++) {
            const t = (i / wordsCount) * 2 * Math.PI;
            
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            
            points.push({
                x: x * scaleHeart + canvas.width / 2,     
                y: -y * scaleHeart + canvas.height / 2 - 20, 
                // Выравниваем слова горизонтально, чтобы они легко читались
                rotation: 0 
            });
        }

        let scaleFactor = 1;
        let growing = true;

        function draw() {
            ctx.fillStyle = '#030303';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Мягкое биение
            if (growing) {
                scaleFactor += 0.005;
                if (scaleFactor >= 1.1) growing = false;
            } else {
                scaleFactor -= 0.005;
                if (scaleFactor <= 0.95) growing = true;
            }

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(scaleFactor, scaleFactor);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);

            // Шрифт и красивый розовый неон
            ctx.font = 'bold 12px Arial';
            ctx.fillStyle = '#ff2a74';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff2a74';

            // Отрисовка раздельных слов
            points.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                // Сдвигаем по центру точки, чтобы буквы стояли ровно
                ctx.textAlign = "center"; 
                ctx.fillText('love', 0, 0);
                ctx.restore();
            });

            ctx.restore();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
